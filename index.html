<!doctype html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <meta name="Description" content="litePlay — live coding environment" />
        <meta charset="utf-8" />
        <title>litePlay</title>
        <link rel="stylesheet" crossorigin href="./src/editor/style.css" />
    </head>
    <body>
        <nav class="tab-bar">
            <span class="tab-logo">litePlay</span>
            <a class="tab tab-active" href="./">Editor</a>
            <a class="tab" href="./src/sequencer/">Sequencer</a>
            <a class="tab tab-docs" href="https://g-ubimus.github.io/litePlay.docs/" target="_blank">Docs ↗</a>
        </nav>

        <div class="page">
            <div class="description">
                <p>Welcome to litePlay!</p>
                <p>Write your code below and hit <b>RUN</b> or type <b>Ctrl+Enter</b>.</p>
                <p>Use <b>STOP</b> or <b>Ctrl+.</b> to pause everything.</p>
                <p>Record audio with <b>REC</b> or <b>Ctrl+R</b>.</p>
                <p>New? Read the <a href="https://g-ubimus.github.io/litePlay.docs/" target="_blank">docs</a>.</p>
            </div>
            <div class="toolbar">
                <button class="button btn-run" id="run-btn">&#9654; RUN</button>
                <button class="button btn-stop" id="stop-btn">&#9724; STOP</button>
                <div class="toolbar-sep"></div>
                <button class="button btn-save" id="save-btn">&#9660; SAVE</button>
                <button class="button btn-rec" id="rec-btn">&#9673; REC</button>
                <button class="button btn-stoprec" id="stopRec-btn">&#9689; STOP REC</button>
                <div class="toolbar-hint">
                    <kbd>Ctrl+Enter</kbd>
                    run &nbsp;
                    <kbd>Ctrl+.</kbd>
                    stop &nbsp;
                    <kbd>Ctrl+R</kbd>
                    record
                </div>
            </div>

            <div id="editor-container" class="cm-container"></div>

            <textarea
                id="console-output"
                autocomplete="off"
                readonly
                class="console"
                placeholder="Click anywhere to start litePlay."></textarea>
        </div>

        <script type="module" src="./src/editor/editor.ts"></script>
    </body>
</html>
